<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foundation 1899 | Basket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="min-h-screen flex flex-col">

    <nav class="flex justify-between items-center px-10 py-6 border-b border-gray-800">
        <div class="flex items-center space-x-4">
            <img src="../img/logo.png" alt="Foundation 1899" class="h-10">
        </div>
        <div class="hidden md:flex space-x-8 text-xs tracking-[0.2em] font-semibold text-gray-400">
            <a href="index.html" class="hover:text-gold transition">STORE</a>
        </div>
        <a href="index.html" class="border border-gold text-gold px-6 py-3 text-xs font-bold tracking-widest hover:bg-gold hover:text-black transition">
            BACK TO SCRIPTS
        </a>
    </nav>

    <main class="flex-grow p-10 max-w-5xl mx-auto w-full flex flex-col md:flex-row gap-10">
        
        <div class="flex-grow">
            <h1 class="text-3xl font-serif text-white mb-6 border-b border-gray-800 pb-4">Your Ledger</h1>
            <div id="basket-items" class="space-y-4">
                <p class="text-gray-500 italic">Loading ledger...</p>
            </div>
        </div>

        <div class="w-full md:w-80 flex-shrink-0">
            <div class="card-bg p-6 border border-gray-800">
                <h2 class="text-xl font-serif text-white mb-4">Summary</h2>
                <div class="flex justify-between text-gray-400 mb-4 pb-4 border-b border-gray-800">
                    <span>Subtotal</span>
                    <span id="basket-subtotal" class="text-white font-bold">$0.00</span>
                </div>
                
                <button id="checkout-btn" onclick="beginCheckout()" class="w-full bg-gold text-black py-3 text-xs font-bold tracking-widest hover:bg-yellow-500 transition border-none mt-2">
                    PROCEED TO CHECKOUT
                </button>
                <p class="text-[10px] text-gray-500 text-center mt-4">Requires Cfx.re authentication</p>
            </div>
        </div>
    </main>

    <script src="../js/basket.js"></script>
</body>
</html>
